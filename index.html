    <h2>PATIENT REGISTRATION FORM</h2>
    
        <form action="https://yourphphost.com/insert.php" method="POST" onsubmit="return showAlert() ">

        <div class="form-row">
            <label for="name">Name:</label>
            <input type="text" name="name" placeholder="Full Name" required>
        </div>
        <div class="form-row">
            <label for="age">Age:</label>
            <input type="number" name="age" placeholder="Age" required>
        </div>
        <div class="form-row">
            <label for="gender">Gender:</label>
            <select name="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>
        </div>
        <div class="form-row">
            <label for="disease">Disease:</label>
            <input type="text" name="disease" placeholder="Disease/Symptoms" required>
        </div>
        <div class="form-row">
            <label for="rx">Rx:</label>
            <input type="text" name="rx" placeholder="Prescription" required>
        </div>
        <div class="form-row">
            <label for="visit_date">Visit Date:</label>
            <input type="date" name="visit_date" required>
        </div>
        <div class="form-row">
            <label for="followup_date">Followup Date:</label>
            <input type="date" name="followup_date" required>
        </div>
        <div class="form-row">
            <label for="contact">Contact:</label>
            <input type="text" name="contact" placeholder="Contact Number" required>
        </div>
        <input type="submit" value="Add Patient">

function showAlert() {
    alert("Patient data has been added successfully.");
    return true; // continue form submission
}
</script>
